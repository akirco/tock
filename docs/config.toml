# Tock Configuration File
# Location: ~/.config/tock/config.toml

# Font: standard, small, big, slant, or path to .flf file
# font = "standard"

# Global background color (e.g., black, "#1e1e1e", reset)
# bg = "reset"

# Clock text color (e.g., cyan, "#00ff00", white)
# fg = "cyan"

# Subtitle text color (e.g., cyan, "#00ff00", white)
# subtitle_fg = "cyan"

# Clock color gradient
# Presets: rainbow, sinebow, viridis, magma, plasma, inferno, turbo, spectral, blues, greens, reds, oranges, purples, warm, cool
# Custom: comma-separated colors (e.g., "red,blue,green" or "#ff0000,#00ff00")
# color = "rainbow"

# Panel height ratio when visible (0-100)
# panel_ratio = 50

# Panel background color
# panel_bg = "reset"

# Panel foreground/text color
# panel_fg = "cyan"

# Panel border color
# panel_border = "cyan"

# Panel border sides: none, all, left, right, top, bottom, horizontal, vertical
# panel_border_sides = "vertical"

# Panel border style: plain, rounded, double, thick
# panel_border_style = "rounded"

# Alarm sound file (place in ~/.config/tock/sounds/)
# Default: alarm.mp3
# alarm_sound = "alarm"

# Countdown end sound file
# Default: alarm.mp3
# countdown_sound = "alarm"

# Hide help text in footer and panel
# hidden_help = false
